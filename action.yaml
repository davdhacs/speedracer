name: Speedracer
description: >
  Speculative execution for matrix jobs. Add 'speedracer: [a, b]' (or
  [a, b, c, d]) as the LAST matrix dimension and call this as the first
  step — nothing else needed.

  Copy 'a' is the fallback — it always runs regardless of CPU speed.
  On a fast runner, 'a' posts an in_progress check-run as a signal.
  Other copies (b/c/d) check their CPU, then poll for 'a's signal.
  If 'a' is fast, duplicates cancel themselves within the composite
  action step (producing 'cancelled' status, not 'failure').

  Post-step resolves the check-run on job exit — POSTs completed/success
  on success, PATCHes to completed/failure on failure.

inputs:
  check-name:
    description: >
      Override the auto-derived required check name. Auto-derived as:
        github.job + " (" + matrix-values-excluding-speedracer + ")"
      Only set this if the auto-derived name does not match branch protection.
    required: false
    default: ''
  slow-cpu-pattern:
    description: >
      Substring of CPU model name that marks a slow runner. Default is
      auto-read from runner-pool.tsv (updated weekly by the profiler).
    required: false
    default: ''
  enabled:
    description: 'Set to false to disable speedracer — all copies run normally'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Speedracer
      id: speedracer
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Load slow CPU pattern: caller override > profiler data > hardcoded fallback
        SLOW_PATTERN="${{ inputs.slow-cpu-pattern }}"
        if [[ -z "$SLOW_PATTERN" && -f "${GITHUB_ACTION_PATH}/runner-pool.tsv" ]]; then
          SLOW_PATTERN=$(grep -v '^#' "${GITHUB_ACTION_PATH}/runner-pool.tsv" | head -1 | cut -f1 || true)
          echo "Using profiler slow-cpu-pattern: ${SLOW_PATTERN}"
        fi
        [[ -z "$SLOW_PATTERN" ]] && SLOW_PATTERN="7763" && echo "Using hardcoded fallback: ${SLOW_PATTERN}"

        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speedracer disabled — this copy always runs."
          exit 0
        fi

        MY_COPY="${{ matrix.speedracer }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"

        CHECK_NAME="${{ inputs.check-name }}"
        if [[ -z "$CHECK_NAME" ]]; then
          MATRIX_JSON='${{ toJSON(matrix) }}'
          OTHER_VALS=$(echo "$MATRIX_JSON" | \
            jq -r 'del(.speedracer) | to_entries | map(.value | tostring) | join(", ")')
          if [[ -n "$OTHER_VALS" ]]; then
            CHECK_NAME="${{ github.job }} ($OTHER_VALS)"
          else
            CHECK_NAME="${{ github.job }}"
          fi
          echo "Auto-derived check-name: $CHECK_NAME"
        fi

        cpu=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs || true)
        [[ -z "$cpu" ]] && cpu=$(lscpu | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}' || true)
        IS_SLOW=$([[ "$cpu" == *"${SLOW_PATTERN}"* ]] && echo true || echo false)
        echo "cpu=${cpu:-unknown} copy=${MY_COPY} is_slow=${IS_SLOW}"

        EXT_ID="spec-${MY_COPY}-${RUN_ID}-${CHECK_NAME}"

        # ── Copy 'a' is the fallback — always runs, never polls ─────────────
        if [[ "$MY_COPY" == "a" ]]; then
          if [[ "$IS_SLOW" == "true" ]]; then
            echo "Copy a: slow runner, running as silent fallback"
            printf '' > /tmp/speedracer-check-id
          else
            check_id=$(gh api repos/"${REPO}"/check-runs \
              -f name="${CHECK_NAME}" \
              -f head_sha="${{ github.sha }}" \
              -f status=in_progress \
              -f external_id="${EXT_ID}" \
              --jq '.id')
            printf '%s\n' "${check_id:-}" > /tmp/speedracer-check-id
            echo "Copy a: fast runner, posted in_progress ${check_id}"
          fi
          printf '%s\n' "${CHECK_NAME}" > /tmp/speedracer-check-name
          printf '%s\n' "${MY_COPY}" > /tmp/speedracer-copy
          echo "Speedracer ready — proceeding to work."
          exit 0
        fi

        # ── Copies b/c/d: CPU gate ──────────────────────────────────────────
        if [[ "$IS_SLOW" == "true" ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to another copy."
          kill -TERM "$PPID"
          sleep 600
        fi

        # Fast runner — post in_progress check-run
        check_id=$(gh api repos/"${REPO}"/check-runs \
          -f name="${CHECK_NAME}" \
          -f head_sha="${{ github.sha }}" \
          -f status=in_progress \
          -f external_id="${EXT_ID}" \
          --jq '.id')
        printf '%s\n' "${check_id:-}" > /tmp/speedracer-check-id
        printf '%s\n' "${CHECK_NAME}" > /tmp/speedracer-check-name
        printf '%s\n' "${MY_COPY}" > /tmp/speedracer-copy
        echo "Posted in_progress check-run ${check_id} (${EXT_ID})"

        # ── Poll for lower-lettered siblings within the composite step ──────
        # Blocking poll: if a sibling posted in_progress, this copy is a
        # duplicate. SIGTERM during the composite step → 'cancelled' (not
        # 'failure'), so fail-fast won't cascade.
        case "$MY_COPY" in
          b) WATCH_IDS="spec-a-${RUN_ID}-${CHECK_NAME}" ;;
          c) WATCH_IDS="spec-a-${RUN_ID}-${CHECK_NAME}|spec-b-${RUN_ID}-${CHECK_NAME}" ;;
          d) WATCH_IDS="spec-a-${RUN_ID}-${CHECK_NAME}|spec-b-${RUN_ID}-${CHECK_NAME}|spec-c-${RUN_ID}-${CHECK_NAME}" ;;
          *) WATCH_IDS="" ;;
        esac

        if [[ -n "$WATCH_IDS" ]]; then
          IFS='|' read -ra _sids <<< "$WATCH_IDS"
          echo "Polling for siblings (${WATCH_IDS})..."
          sleep $(( RANDOM % 2 + 5 ))

          poll=0
          deadline=$(( $(date +%s) + 15 ))
          while [[ $(date +%s) -lt $deadline ]]; do
            poll=$(( poll + 1 ))
            response=$(gh api \
              "repos/${REPO}/commits/${{ github.sha }}/check-runs?per_page=100&filter=all")

            for sid in "${_sids[@]}"; do
              found=$(echo "$response" | jq -r --arg sid "$sid" \
                '[.check_runs[] | select(.external_id == $sid) | select(.status == "in_progress" or .conclusion == "success")] | length')
              if [[ "$found" -gt 0 ]]; then
                echo "Sibling ${sid} is running — cancelling this copy."
                kill -TERM "$PPID"
                sleep 600
              fi
            done

            sleep 2
          done
          echo "No siblings found after ${poll} polls — proceeding to work."
        fi

        echo "Speedracer ready — proceeding to work."

    # ${{ job.status }} is evaluated at post-step execution time.
    - name: Register post-hook
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      if: inputs.enabled == 'true'
      with:
        shell: bash
        run: 'true'
        post: >-
          export GH_TOKEN=${{ github.token }};
          JOB_STATUS="${{ job.status }}";
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n');
          my_copy=$(head -1 < /tmp/speedracer-copy | tr -d '\n');
          check_id=$(head -1 < /tmp/speedracer-check-id | tr -d '[:space:]' || true);
          ext_id="spec-${my_copy}-${{ github.run_id }}-${check_name}";
          echo "Speedracer post: job.status=${JOB_STATUS} copy=${my_copy} check_id=${check_id}";
          if [[ "$JOB_STATUS" == "success" ]]; then gh api "repos/${{ github.repository }}/check-runs" -f name="${check_name}" -f head_sha="${{ github.sha }}" -f external_id="${ext_id}" -f status=completed -f conclusion=success -f "output[title]=Speedracer complete" -f "output[summary]=Copy ${my_copy} won." && echo "posted completed/success" || echo "::warning::POST success failed";
          elif [[ "$JOB_STATUS" == "failure" ]]; then echo "Real failure — resolving check-run"; [[ "$check_id" =~ ^[0-9]+$ ]] || { echo "no valid check-id, skipping"; exit 0; }; gh api "repos/${{ github.repository }}/check-runs/${check_id}" -X PATCH -f status=completed -f conclusion=failure -f 'output[title]=Speedracer cleanup' -f 'output[summary]=Job failed; check-run resolved.' && echo "check-run → failure" || echo "::warning::PATCH failure failed";
          else echo "job.status=${JOB_STATUS} — no action taken";
          fi
