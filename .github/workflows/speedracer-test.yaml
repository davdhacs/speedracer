name: Speedracer Test
# Comprehensive test suite for .github/actions/speedracer.
# Tests both job outcomes (success/cancelled/failure) AND the GHA Checks API
# state (check-run name, status, conclusion) to prove the full contract.
#
# Overall workflow conclusion may be 'cancelled' or 'failure' — expected,
# because non-winner copies are cancelled and some tests deliberately fail.
on:
  push:
    branches: [main]
    paths:
      - action.yaml
      - .github/workflows/speedracer-test.yaml
  pull_request:
    paths:
      - action.yaml
      - .github/workflows/speedracer-test.yaml
  workflow_dispatch:

permissions:
  checks: write

jobs:

  # ─── Structural scenarios ──────────────────────────────────────────────────

  # Test 0: DIRECT (no composite action) monitor isolates the raw mechanism.
  # Proves SIGTERM from a background process during a regular step → 'failure'.
  # This is why we use composite actions. fail-fast:false because b deliberately fails.
  # Expected: a=success, b=failure.
  test-direct-monitor:
    strategy:
      fail-fast: false
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Gate
        run: |
          MY_COPY="${{ matrix.speedracer }}"
          MY_PARENT=$PPID
          if [[ "$MY_COPY" == "b" ]]; then
            nohup bash -c "
              sleep 25
              job_line=\$(gh api 'repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100' \
                --jq '.jobs[] | select(.name | test(\"[( ,]a[)]\$\")) | \"\(.status)/\(.conclusion)\"' \
                | head -1)
              echo \"Sibling a: '\${job_line}'\"
              if [[ \"\${job_line}\" == 'in_progress/'* || \"\${job_line}\" == 'completed/success' ]]; then
                kill -TERM ${MY_PARENT}
              fi
            " >> /tmp/direct-monitor.log 2>&1 &
            disown
          fi

      - name: Work (60s — b killed at ~25s via regular step SIGTERM → failure)
        run: sleep 60

      - name: Monitor log
        if: always()
        run: cat /tmp/direct-monitor.log || echo "(no log)"

  # Test 1: 2-copy. Highest-ranked copy wins. Same rank → higher letter wins.
  # At least one copy must succeed.
  test-2copy:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Work (60s)
        run: sleep 60

  # Test 2: 3-copy. Highest-ranked copy wins.
  # At least one copy must succeed.
  test-3copy:
    strategy:
      matrix:
        speedracer: [a, b, c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Work (90s)
        run: sleep 90

  # Test 3: enabled=false — both copies run, no gating.
  # Expected: a=success, b=success.
  test-disabled:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          enabled: 'false'
      - name: Work
        run: sleep 5

  # Test 4: 4-copy. Highest-ranked copy wins (rank from TSV). Same rank
  # ties break by letter. At least one copy must succeed.
  test-4copy:
    strategy:
      matrix:
        speedracer: [a, b, c, d]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Work (120s)
        run: sleep 120

  # ─── API-verified tests ────────────────────────────────────────────────────

  # Test 5: Verify check-run posted with rank in external_id.
  # Expected: a=success. Verify: in_progress check-run, external_id has r{rank}.
  test-verify-check-run-with-rank:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./

      - name: Assert check-run has rank in external_id
        run: |
          check_id=$(head -1 < /tmp/speedracer-check-id | tr -d '[:space:]')
          [[ "$check_id" =~ ^[0-9]+$ ]] || { echo "FAIL: no check-id posted"; exit 1; }
          status=$(gh api "repos/${{ github.repository }}/check-runs/${check_id}" --jq '.status')
          ext_id=$(gh api "repos/${{ github.repository }}/check-runs/${check_id}" --jq '.external_id')
          echo "check_id=${check_id} status=${status} external_id=${ext_id}"
          [[ "$status" == "in_progress" ]] || { echo "FAIL: expected in_progress, got: ${status}"; exit 1; }
          # Verify rank segment in external_id: spec-{letter}-r{rank}-...
          [[ "$ext_id" =~ ^spec-[a-z]-r[0-9]+-${{ github.run_id }}- ]] || {
            echo "FAIL: external_id format wrong: ${ext_id}"; exit 1
          }
          echo "PASS: check-run posted with rank in external_id"

      - name: Assert rank file exists
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          echo "rank=${rank}"
          [[ "$rank" =~ ^[0-9]+$ ]] || { echo "FAIL: rank not a number: ${rank}"; exit 1; }
          echo "PASS: rank=${rank} saved to /tmp/speedracer-rank"

      - name: Work (20s)
        run: sleep 20

  verify-check-run-with-rank:
    needs: test-verify-check-run-with-rank
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step to propagate
        run: sleep 20

      - name: Assert at least one copy posted conclusion=success
        run: |
          check_name="test-verify-check-run-with-rank"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-run(s) with conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: found completed/success check-run"; exit 0; }
            sleep 10
          done
          echo "FAIL: no check-run reached conclusion=success"; exit 1

  # Test 6: Failure path — the winning copy fails, post-step patches check-run
  # to failure. Uses a single copy so we know exactly who wins.
  # Expected: a=failure. Verify: failure check-run exists.
  test-failure-path:
    strategy:
      matrix:
        speedracer: [a]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Deliberate failure
        run: |
          echo "Deliberate failure to test post-step patches check-run"
          exit 1

  verify-failure-path:
    needs: test-failure-path
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-steps to propagate
        run: sleep 20
      - name: Assert failure check-run exists
        run: |
          check_name="test-failure-path"
          for i in $(seq 1 12); do
            failures=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"failure\")] | length")
            echo "attempt $i: failures=${failures}"
            [[ "$failures" -gt 0 ]] && { echo "PASS: found failure check-run"; exit 0; }
            sleep 10
          done
          echo "FAIL: no failure check-run found"; exit 1

  # Test 7: enabled=false posts ZERO check-runs.
  # Expected: a=success, b=success. Verify: 0 check-runs with spec- external_id.
  test-no-check-run-when-disabled:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          enabled: 'false'
      - name: Assert no check-id file was written
        run: |
          if [[ -f /tmp/speedracer-check-id ]] && [[ -n "$(cat /tmp/speedracer-check-id)" ]]; then
            echo "FAIL: /tmp/speedracer-check-id written despite enabled=false"
            exit 1
          fi
          echo "PASS: no check-id file (no check-run posted)"
      - name: Work
        run: sleep 5

  verify-no-check-run-when-disabled:
    needs: test-no-check-run-when-disabled
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Assert zero check-runs posted for this job
        run: |
          count=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
            --jq '[.check_runs[] | select(.name | startswith("test-no-check-run-when-disabled")) | select(.external_id | startswith("spec-"))] | length')
          echo "check-runs with spec- external_id for this job: ${count}"
          [[ "$count" == "0" ]] || { echo "FAIL: ${count} unexpected check-run(s) despite enabled=false"; exit 1; }
          echo "PASS: no check-runs posted when disabled"

  # Test 8: Single-copy matrix (speedracer: [a] only).
  # Expected: a=success, check-run posted with rank.
  test-single-copy:
    strategy:
      matrix:
        speedracer: [a]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Assert single copy ran successfully
        run: |
          [[ -f /tmp/speedracer-check-name ]] || { echo "FAIL: gate didn't complete"; exit 1; }
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          echo "PASS: single-copy ran, rank=${rank}"
      - name: Work
        run: sleep 5

  verify-single-copy:
    needs: test-single-copy
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert single-copy check-run conclusion=success
        run: |
          check_name="test-single-copy"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-runs with conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: single-copy check-run=success"; exit 0; }
            sleep 10
          done
          echo "FAIL: single-copy check-run did not reach success"; exit 1

  # Test 9: Multi-dimensional matrix — check-name auto-derived excludes speedracer key.
  # Matrix: flavor x speedracer. CHECK_NAME must be "test-multi-dim-check-name (alpha)".
  # Expected: a=success, b=cancelled (same rank, letter tiebreak). Verify: check-run name correct.
  test-multi-dim-check-name:
    strategy:
      matrix:
        flavor: [alpha]
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Assert check-name excludes speedracer key
        run: |
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n')
          expected="test-multi-dim-check-name (alpha)"
          echo "check_name='${check_name}' expected='${expected}'"
          [[ "$check_name" == "$expected" ]] || { echo "FAIL: check-name mismatch"; exit 1; }
          echo "PASS: check-name correctly derived"
      - name: Work (60s)
        run: sleep 60

  verify-multi-dim-check-name:
    needs: test-multi-dim-check-name
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert check-run name is correct
        run: |
          check_name="test-multi-dim-check-name (alpha)"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-runs with name='${check_name}' and conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: found correct check-run name with success"; exit 0; }
            sleep 10
          done
          echo "FAIL: no check-run with correct name reached success"; exit 1

  # Test 10: Explicit check-name input overrides auto-derivation.
  # Expected: a=success. Verify: check-run name='speedracer-explicit-override'.
  test-explicit-check-name:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          check-name: speedracer-explicit-override
      - name: Assert stored check-name matches override
        run: |
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n')
          [[ "$check_name" == "speedracer-explicit-override" ]] || {
            echo "FAIL: check_name='${check_name}' (expected 'speedracer-explicit-override')"; exit 1
          }
          echo "PASS: explicit check-name stored verbatim"
      - name: Work (60s)
        run: sleep 60

  verify-explicit-check-name:
    needs: test-explicit-check-name
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert check-run uses override name in API
        run: |
          check_name="speedracer-explicit-override"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-runs with name='${check_name}' and conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: found override name with success"; exit 0; }
            sleep 10
          done
          echo "FAIL: no check-run with override name reached success"; exit 1

  # Test 11: Sibling fails — failure is not a win signal.
  # copy b: posts check-run then deliberately fails.
  # copy a: defers to b initially, but b's failure isn't in_progress/success.
  # Expected: b=failure, a=success. Verify: failure check-run exists.
  test-sibling-fails-not-winner:
    strategy:
      fail-fast: false
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Work (b fails; a proceeds since b's failure is not a win signal)
        run: |
          if [[ "${{ matrix.speedracer }}" == "b" ]]; then
            sleep 3 && echo "Copy b: deliberate failure" && exit 1
          else
            sleep 90 && echo "Copy a: should proceed since b failed"
          fi
      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  verify-sibling-fails-not-winner:
    needs: test-sibling-fails-not-winner
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-steps to propagate
        run: sleep 20
      - name: Assert failure check-run exists
        run: |
          check_name="test-sibling-fails-not-winner"
          for i in $(seq 1 12); do
            failures=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"failure\")] | length")
            echo "attempt $i: failures=${failures}"
            [[ "$failures" -gt 0 ]] && { echo "PASS: failure check-run exists"; exit 0; }
            sleep 10
          done
          echo "FAIL: no failure check-run found"; exit 1

  # ─── Rank-specific tests ─────────────────────────────────────────────────

  # Test 12: Verify rank is read from TSV and matches expected CPU type.
  # All copies on ubuntu-latest get the same CPU → same rank.
  # Rank should be > 0 (CPU is in the TSV).
  test-rank-from-tsv:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Assert rank is from TSV (not 0)
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          echo "rank=${rank}"
          [[ "$rank" -gt 0 ]] || { echo "FAIL: rank is 0 — CPU not found in TSV"; exit 1; }
          echo "PASS: rank=${rank} from TSV"
      - name: Work
        run: sleep 5

  # Test 13: Missing TSV → rank 0. All copies proceed, letter tiebreak.
  test-missing-tsv-rank-zero:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Delete runner-pool.tsv
        run: rm -f runner-pool.tsv
      - uses: ./
      - name: Assert rank is 0
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          echo "rank=${rank}"
          [[ "$rank" -eq 0 ]] || { echo "FAIL: rank should be 0 without TSV, got: ${rank}"; exit 1; }
          echo "PASS: rank=0 (no TSV)"
      - name: Work
        run: sleep 5

  # Test 14: Empty TSV → rank 0.
  test-empty-tsv-rank-zero:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Replace TSV with empty file
        run: echo "# empty profile" > runner-pool.tsv
      - uses: ./
      - name: Assert rank is 0
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          [[ "$rank" -eq 0 ]] || { echo "FAIL: rank should be 0 with empty TSV, got: ${rank}"; exit 1; }
          echo "PASS: rank=0 (empty TSV)"
      - name: Work
        run: sleep 5

  # Test 15: Special characters in matrix values with ranking.
  test-special-chars-matrix:
    strategy:
      matrix:
        flavor: ["with spaces"]
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Assert check-name has spaces
        run: |
          check_name=$(cat /tmp/speedracer-check-name | head -1 | tr -d '\n')
          echo "check_name='${check_name}'"
          [[ "$check_name" == *"with spaces"* ]] || { echo "FAIL: spaces not in check-name"; exit 1; }
          echo "PASS: check-name includes matrix value with spaces"
      - name: Work
        run: sleep 30

  verify-special-chars-matrix:
    needs: test-special-chars-matrix
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert check-run with spaces in name has conclusion=success
        run: |
          check_name="test-special-chars-matrix (with spaces)"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs for '${check_name}'"
            [[ "$count" -gt 0 ]] && { echo "PASS: special chars in check-name work"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run with spaces in name"; exit 1

  # Test 16: 8-copy matrix. Highest-ranked copy wins.
  # At least one copy must succeed.
  test-8copy:
    strategy:
      matrix:
        speedracer: [a, b, c, d, e, f, g, h]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Work
        run: |
          echo "Copy ${{ matrix.speedracer }}: running on $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)"
          sleep 10

  verify-8copy:
    needs: test-8copy
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert at least one copy succeeded
        run: |
          check_name="test-8copy"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs"
            [[ "$count" -gt 0 ]] && { echo "PASS: at least one copy succeeded"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run"; exit 1

  # Test 17: ARM64 runner gets rank from TSV (or 0 if not listed).
  # Should proceed normally regardless.
  test-arm64-ranked:
    strategy:
      matrix:
        speedracer: [a]
    runs-on: ubuntu-24.04-arm
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
      - name: Assert ranked and running
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          echo "PASS: arm64 runner proceeded, rank=${rank}"
          echo "RUNNER_ARCH=${RUNNER_ARCH}"

  # Test 18: TSV reading — verify file exists and has valid data.
  test-tsv-reading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Assert runner-pool.tsv exists and is valid
        run: |
          [[ -f runner-pool.tsv ]] || { echo "FAIL: runner-pool.tsv missing"; exit 1; }
          lines=$(grep -cv '^#' runner-pool.tsv)
          echo "runner-pool.tsv has ${lines} CPU entries"
          [[ "$lines" -gt 0 ]] || { echo "FAIL: no CPU entries"; exit 1; }
          first=$(grep -v '^#' runner-pool.tsv | head -1 | cut -f1)
          echo "Slowest CPU ID: '${first}'"
          [[ -n "$first" ]] || { echo "FAIL: empty first column"; exit 1; }
          cat runner-pool.tsv
          echo "PASS"

  # ─── TSV manipulation tests ────────────────────────────────────────────────

  # Test 19: Custom TSV with runner's CPU at line 2 (rank 2).
  # A fake slower entry is at line 1. All copies get rank 2.
  # Same rank → letter tiebreak → b wins, a is fallback.
  # Verify: exactly 1 success check-run.
  test-tsv-rank-2:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Create custom TSV with fake slower entry
        run: |
          cpu=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          {
            printf "# cpu_id\tcount\tpct\tavg_bench_ms\tavg_disk_mbs\tcores\tmem_mb\tfull_model\n"
            printf "FAKE\t1\t10%%\t9999\t100\t4\t15990\tFake Slow CPU That Does Not Exist\n"
            printf "REAL\t9\t90%%\t5000\t500\t4\t15990\t%s\n" "$cpu"
          } > runner-pool.tsv
          echo "Custom TSV:"
          cat runner-pool.tsv
      - uses: ./
      - name: Assert rank is 2
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          echo "rank=${rank}"
          [[ "$rank" -eq 2 ]] || { echo "FAIL: expected rank 2, got ${rank}"; exit 1; }
          echo "PASS: rank=2 (runner's CPU is at line 2)"
      - name: Work
        run: sleep 30

  verify-tsv-rank-2:
    needs: test-tsv-rank-2
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert exactly 1 success check-run
        run: |
          check_name="test-tsv-rank-2"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs"
            [[ "$count" -gt 0 ]] && { echo "PASS: ${count} success check-run(s)"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run"; exit 1

  # Test 20: Custom TSV with 3 entries. Runner CPU at line 3 (rank 3, fastest).
  # Two fake slower entries above. All copies get rank 3.
  test-tsv-rank-3-top:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Create custom TSV with runner at line 3
        run: |
          cpu=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          {
            printf "# cpu_id\tcount\tpct\tavg_bench_ms\tavg_disk_mbs\tcores\tmem_mb\tfull_model\n"
            printf "OLDEST\t1\t10%%\t9999\t100\t4\t15990\tFake Very Old CPU\n"
            printf "OLD\t1\t10%%\t7000\t200\t4\t15990\tFake Old CPU\n"
            printf "REAL\t8\t80%%\t5000\t500\t4\t15990\t%s\n" "$cpu"
          } > runner-pool.tsv
      - uses: ./
      - name: Assert rank is 3
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          [[ "$rank" -eq 3 ]] || { echo "FAIL: expected rank 3, got ${rank}"; exit 1; }
          echo "PASS: rank=3 (fastest in 3-entry TSV)"
      - name: Work
        run: sleep 5

  # Test 21: TSV where runner's CPU is NOT listed → rank 0.
  # With 2 copies at rank 0, both same rank → letter tiebreak.
  test-tsv-unlisted-cpu:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Create TSV with only fake CPUs
        run: |
          {
            printf "# cpu_id\tcount\tpct\tavg_bench_ms\tavg_disk_mbs\tcores\tmem_mb\tfull_model\n"
            printf "FAKE1\t5\t50%%\t6000\t300\t4\t15990\tFake CPU Alpha\n"
            printf "FAKE2\t5\t50%%\t4000\t600\t4\t15990\tFake CPU Beta\n"
          } > runner-pool.tsv
      - uses: ./
      - name: Assert rank is 0
        run: |
          rank=$(head -1 < /tmp/speedracer-rank | tr -d '[:space:]')
          [[ "$rank" -eq 0 ]] || { echo "FAIL: expected rank 0 for unlisted CPU, got ${rank}"; exit 1; }
          echo "PASS: rank=0 (CPU not in TSV)"
      - name: Work
        run: sleep 5

  verify-tsv-unlisted-cpu:
    needs: test-tsv-unlisted-cpu
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert success check-run exists (rank-0 copies still work)
        run: |
          check_name="test-tsv-unlisted-cpu"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs"
            [[ "$count" -gt 0 ]] && { echo "PASS: rank-0 copies produced a success check-run"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run"; exit 1

  # ─── Runner survey ────────────────────────────────────────────────────────
  runner-survey:
    needs:
      - test-2copy
      - test-3copy
      - test-disabled
      - test-4copy
      - test-failure-path
      - test-sibling-fails-not-winner
      - test-rank-from-tsv
      - test-missing-tsv-rank-zero
      - test-empty-tsv-rank-zero
      - test-special-chars-matrix
      - test-8copy
      - test-arm64-ranked
      - test-tsv-rank-2
      - test-tsv-rank-3-top
      - test-tsv-unlisted-cpu
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Collect CPU models from all jobs in this run
        run: |
          echo "=== Runner Pool Survey for run ${{ github.run_id }} ==="
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.conclusion != null) | {name: .name, runner: .runnerName, labels: .labels}' | \
            jq -s 'group_by(.labels) | .[] | {labels: .[0].labels, count: length, jobs: [.[].name]}' 2>/dev/null || true
          echo ""
          echo "=== CPU models from job logs ==="
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.conclusion != null) | .databaseId' | while read JOB_ID; do
            cpu=$(gh api "repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs" 2>&1 | grep "cpu=" | grep -v "36;1m" | head -1 | sed 's/.*cpu=//' | sed 's/ copy=.*//')
            [[ -n "$cpu" ]] && echo "$cpu"
          done | sort | uniq -c | sort -rn
