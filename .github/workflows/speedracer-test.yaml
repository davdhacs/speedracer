name: Speedracer Test
# Comprehensive test suite for .github/actions/speedracer.
# Tests both job outcomes (success/cancelled/failure) AND the GHA Checks API
# state (check-run name, status, conclusion) to prove the full contract.
#
# Overall workflow conclusion may be 'cancelled' or 'failure' — expected,
# because non-winner copies are cancelled and some tests deliberately fail.
on:
  push:
    branches: [main]
    paths:
      - action.yaml
      - .github/workflows/speedracer-test.yaml
  pull_request:
    paths:
      - action.yaml
      - .github/workflows/speedracer-test.yaml
  workflow_dispatch:

permissions:
  checks: write

jobs:

  # ─── Original tests: structural scenarios ───────────────────────────────────

  # Test 0: DIRECT (no composite action) monitor isolates the raw mechanism.
  # Proves SIGTERM from a background process during a regular step → 'failure'.
  # This is why we use composite actions. fail-fast:false because b deliberately fails.
  # Expected: a=success, b=failure.
  test-direct-monitor:
    strategy:
      fail-fast: false
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Gate
        run: |
          MY_COPY="${{ matrix.speedracer }}"
          MY_PARENT=$PPID
          if [[ "$MY_COPY" == "b" ]]; then
            nohup bash -c "
              sleep 25
              job_line=\$(gh api 'repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100' \
                --jq '.jobs[] | select(.name | test(\"[( ,]a[)]\$\")) | \"\(.status)/\(.conclusion)\"' \
                | head -1)
              echo \"Sibling a: '\${job_line}'\"
              if [[ \"\${job_line}\" == 'in_progress/'* || \"\${job_line}\" == 'completed/success' ]]; then
                kill -TERM ${MY_PARENT}
              fi
            " >> /tmp/direct-monitor.log 2>&1 &
            disown
          fi

      - name: Work (60s — b killed at ~25s via regular step SIGTERM → failure)
        run: sleep 60


      - name: Monitor log
        if: always()
        run: cat /tmp/direct-monitor.log || echo "(no log)"

  # Test 1: 2-copy, both fast. a=fallback, always runs.
  # Expected: a=success, b=cancelled or failure (monitor kills duplicate).
  test-a-wins:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Work (60s)
        run: sleep 60


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  # Test 2: 3-copy, all fast, a wins. Expected: a=success, b=cancelled, c=cancelled.
  test-three-copy:
    strategy:
      matrix:
        speedracer: [a, b, c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Work (90s)
        run: sleep 90


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  # Test 3: a and b are slow (deterministic CPU match); c wins as last-copy fallback.
  # Expected: a=success (fallback, runs slow), b=cancelled (gate), c=success (fast).
  test-ab-slow-c-wins:
    strategy:
      matrix:
        speedracer: [a, b, c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model for deterministic slow pattern
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
      - uses: ./
        with:
          slow-cpu-pattern: ${{ contains(fromJSON('["a","b"]'), matrix.speedracer) && steps.cpu.outputs.model || 'NEVER_MATCH_THIS' }}
      - name: Work
        run: sleep 10


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  # Test 4: a is slow (deterministic), b is fast. a=fallback, runs silently.
  # Expected: a=success (slow fallback), b=success (fast, a didn't signal).
  test-a-slow-b-wins:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
      - uses: ./
        with:
          slow-cpu-pattern: ${{ matrix.speedracer == 'a' && steps.cpu.outputs.model || 'NEVER_MATCH_THIS' }}
      - name: Work
        run: sleep 5


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  # Test 5: enabled=false — both copies run, no gating. Expected: a=success, b=success.
  test-disabled:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          enabled: 'false'
      - name: Work
        run: sleep 5

  # Test 6: Winner finishes before monitor's first poll (5-6s sleep).
  # Expected: a=success, b=cancelled (monitor finds a=completed/success).
  test-fast-winner:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Work (2s — completes before monitor's initial sleep)
        run: sleep 2


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  # Test 7: 4-copy. Expected: a=success, b/c/d=cancelled.
  test-four-copy:
    strategy:
      matrix:
        speedracer: [a, b, c, d]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Work (120s)
        run: sleep 120


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  # ─── New: API-verified tests ────────────────────────────────────────────────

  # Test 8: Verify post.sh patches check-run to completed/success via Checks API.
  # Most critical untested behavior: the branch-protection contract.
  # Also verifies in_progress is posted immediately after gate step.
  # Expected: a=success, b=cancelled. Verify job: API shows conclusion=success.
  test-verify-check-run-success:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Assert check-run is in_progress immediately after gate (before work)
        run: |
          check_id=$(head -1 < /tmp/speedracer-check-id | tr -d '[:space:]')
          [[ "$check_id" =~ ^[0-9]+$ ]] || { echo "FAIL: no check-id posted"; exit 1; }
          status=$(gh api "repos/${{ github.repository }}/check-runs/${check_id}" --jq '.status')
          ext_id=$(gh api "repos/${{ github.repository }}/check-runs/${check_id}" --jq '.external_id')
          echo "check_id=${check_id} status=${status} external_id=${ext_id}"
          [[ "$status" == "in_progress" ]] || { echo "FAIL: expected in_progress, got: ${status}"; exit 1; }
          [[ "$ext_id" == spec-*-${{ github.run_id }}-* ]] || { echo "FAIL: unexpected external_id format: ${ext_id}"; exit 1; }
          echo "PASS: in_progress check-run posted with correct external_id"

      - name: Work (20s)
        run: sleep 20


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  verify-check-run-success:
    needs: test-verify-check-run-success
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step to propagate
        run: sleep 20

      - name: Assert at least one copy posted conclusion=success
        run: |
          check_name="test-verify-check-run-success"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-run(s) with conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: found completed/success check-run"; exit 0; }
            sleep 10
          done
          echo "FAIL: no check-run reached conclusion=success"; exit 1

  # Test 9: Failure path — winner fails, post.sh patches check-run to completed/failure.
  # Also validates monitor 'failed' jq branch: b sees a=conclusion:failure → all_gone → b proceeds.
  # Expected: a=failure, b=success. Verify: a check-run=failure, b check-run=success.
  test-failure-path:
    strategy:
      fail-fast: false
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Work (b fails deliberately to test failure post-step)
        run: |
          if [[ "${{ matrix.speedracer }}" == "b" ]]; then
            echo "Copy b: deliberate failure" && exit 1
          else
            echo "Copy a: fallback (should be cancelled before reaching here)"
            sleep 60
          fi
      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  verify-failure-path:
    needs: test-failure-path
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-steps to propagate
        run: sleep 20
      - name: Assert failure check-run exists (winner failed)
        run: |
          check_name="test-failure-path"
          for i in $(seq 1 12); do
            failures=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"failure\")] | length")
            echo "attempt $i: failures=${failures}"
            [[ "$failures" -gt 0 ]] && { echo "PASS: found failure check-run (winner failed, branch protection unblocked)"; exit 0; }
            sleep 10
          done
          echo "FAIL: no failure check-run found"; exit 1

  # Test 10: enabled=false posts ZERO check-runs.
  # Extends test-disabled by also verifying via API that no check-run exists.
  # Expected: a=success, b=success. Verify: 0 check-runs with spec- external_id.
  test-no-check-run-when-disabled:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          enabled: 'false'
      - name: Assert no check-id file was written
        run: |
          if [[ -f /tmp/speedracer-check-id ]] && [[ -n "$(cat /tmp/speedracer-check-id)" ]]; then
            echo "FAIL: /tmp/speedracer-check-id written despite enabled=false"
            exit 1
          fi
          echo "PASS: no check-id file (no check-run posted)"
      - name: Work
        run: sleep 5

  verify-no-check-run-when-disabled:
    needs: test-no-check-run-when-disabled
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Assert zero check-runs posted for this job
        run: |
          count=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
            --jq '[.check_runs[] | select(.name | startswith("test-no-check-run-when-disabled")) | select(.external_id | endswith("${{ github.run_id }}-test-no-check-run-when-disabled"))] | length')
          echo "check-runs with spec- external_id for this job: ${count}"
          [[ "$count" == "0" ]] || { echo "FAIL: ${count} unexpected check-run(s) despite enabled=false"; exit 1; }
          echo "PASS: no check-runs posted when disabled"

  # Test 11: Single-copy matrix (speedracer: [a] only).
  # Gate detects LAST_COPY=a, skips CPU check even with matching pattern, no monitor.
  # Expected: a=success, no monitor log, check-run posted and eventually marked success.
  test-single-copy:
    strategy:
      matrix:
        speedracer: [a]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read actual CPU model (will be used as slow pattern to prove gate skips it)
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
      - uses: ./
        with:
          slow-cpu-pattern: ${{ steps.cpu.outputs.model }}  # matches real CPU — must NOT gate single copy
      - name: Assert single copy ran successfully
        run: |
          [[ -f /tmp/speedracer-check-name ]] || { echo "FAIL: gate didn't complete"; exit 1; }
          echo "PASS: single-copy ran as expected"
      - name: Work
        run: sleep 5

  verify-single-copy:
    needs: test-single-copy
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert single-copy check-run conclusion=success
        run: |
          check_name="test-single-copy"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-runs with conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: single-copy check-run=success"; exit 0; }
            sleep 10
          done
          echo "FAIL: single-copy check-run did not reach success"; exit 1

  # Test 12: Multi-dimensional matrix — check-name auto-derived excludes speedracer key.
  # Matrix: flavor x speedracer. CHECK_NAME must be "test-multi-dim-check-name (alpha)".
  # Also tests last-copy stem extraction with parentheses.
  # Expected: a=success, b=cancelled. Verify: check-run name correct.
  test-multi-dim-check-name:
    strategy:
      matrix:
        flavor: [alpha]
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Assert check-name excludes speedracer key
        run: |
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n')
          expected="test-multi-dim-check-name (alpha)"
          echo "check_name='${check_name}' expected='${expected}'"
          [[ "$check_name" == "$expected" ]] || { echo "FAIL: check-name mismatch"; exit 1; }
          echo "PASS: check-name correctly derived"
      - name: Work (60s)
        run: sleep 60


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  verify-multi-dim-check-name:
    needs: test-multi-dim-check-name
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert check-run name is correct (no speedracer letter in name)
        run: |
          check_name="test-multi-dim-check-name (alpha)"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-runs with name='${check_name}' and conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: found correct check-run name with success"; exit 0; }
            sleep 10
          done
          echo "FAIL: no check-run with correct name reached success"; exit 1

  # Test 13: Explicit check-name input overrides auto-derivation verbatim.
  # Expected: a=success, b=cancelled. Verify: check-run name='speedracer-explicit-override'.
  test-explicit-check-name:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
          check-name: speedracer-explicit-override
      - name: Assert stored check-name matches override
        run: |
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n')
          [[ "$check_name" == "speedracer-explicit-override" ]] || {
            echo "FAIL: check_name='${check_name}' (expected 'speedracer-explicit-override')"; exit 1
          }
          echo "PASS: explicit check-name stored verbatim"
      - name: Work (60s)
        run: sleep 60


      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  verify-explicit-check-name:
    needs: test-explicit-check-name
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert check-run uses override name in API
        run: |
          check_name="speedracer-explicit-override"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} check-runs with name='${check_name}' and conclusion=success"
            [[ "$count" -gt 0 ]] && { echo "PASS: found override name with success"; exit 0; }
            sleep 10
          done
          echo "FAIL: no check-run with override name reached success"; exit 1

  # Test 14: Sibling fails after posting check-run → monitor treats it as all_gone (not winner).
  # copy a: passes gate, posts check-run, then deliberately fails.
  # copy b: monitor sees a's check-run reach conclusion=failure → jq 'failed' branch → all_gone → b proceeds.
  # Expected: a=failure, b=success. Verify: both check-runs reach correct conclusions.
  test-sibling-fails-not-winner:
    strategy:
      fail-fast: false
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Work (b fails; a detects b's failure is not a win signal)
        run: |
          if [[ "${{ matrix.speedracer }}" == "b" ]]; then
            sleep 3 && echo "Copy b: deliberate failure" && exit 1
          else
            sleep 90 && echo "Copy a: should proceed since b failed (not a winner)"
          fi
      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log || echo "(no log)"

  verify-sibling-fails-not-winner:
    needs: test-sibling-fails-not-winner
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-steps to propagate
        run: sleep 20
      - name: Assert failure check-run exists (higher-priority sibling failed)
        run: |
          check_name="test-sibling-fails-not-winner"
          for i in $(seq 1 12); do
            failures=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"failure\")] | length")
            echo "attempt $i: failures=${failures}"
            [[ "$failures" -gt 0 ]] && { echo "PASS: failure check-run exists"; exit 0; }
            sleep 10
          done
          echo "FAIL: no failure check-run found"; exit 1

  # ─── Edge case tests ──────────────────────────────────────────────────────

  # Test 15: All 4 copies slow — only last-copy survives.
  # Every copy matches the actual CPU model as slow pattern.
  # Expected: a=success (fallback, always runs), b/c/d=cancelled (CPU gate).
  test-all-slow-last-survives:
    strategy:
      matrix:
        speedracer: [a, b, c, d]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
      - uses: ./
        with:
          slow-cpu-pattern: ${{ steps.cpu.outputs.model }}
      - name: Work
        run: |
          echo "Copy ${{ matrix.speedracer }}: only d should reach here"
          sleep 5

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>&1 || echo "(no log)"

  verify-all-slow-last-survives:
    needs: test-all-slow-last-survives
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert check-run exists with conclusion=success
        run: |
          check_name="test-all-slow-last-survives"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs"
            [[ "$count" -gt 0 ]] && { echo "PASS: last-copy survived and posted success"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run — last-copy didn't survive"; exit 1

  # Test 16: Special characters in matrix values — commas, spaces in check-name.
  # CHECK_NAME includes the matrix value which goes into external_id.
  # Verifies jq queries don't break with special chars.
  test-special-chars-matrix:
    strategy:
      matrix:
        flavor: ["with spaces"]
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS
      - name: Assert check-name has spaces
        run: |
          check_name=$(cat /tmp/speedracer-check-name | head -1 | tr -d '\n')
          echo "check_name='${check_name}'"
          [[ "$check_name" == *"with spaces"* ]] || { echo "FAIL: spaces not in check-name"; exit 1; }
          echo "PASS: check-name includes matrix value with spaces"
      - name: Work
        run: sleep 30

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>&1 || echo "(no log)"

  verify-special-chars-matrix:
    needs: test-special-chars-matrix
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert check-run with spaces in name has conclusion=success
        run: |
          check_name="test-special-chars-matrix (with spaces)"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs for '${check_name}'"
            [[ "$count" -gt 0 ]] && { echo "PASS: special chars in check-name work"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run with spaces in name"; exit 1

  # Test 17: POST/CPU-gate race — copy a is forced slow, copy b is last-copy.
  # Copy a posts in_progress BEFORE cpu gate kills it (known race).
  # Copy b is last-copy so it must NOT monitor — even if a's stale in_progress exists.
  # Expected: a=success (slow fallback), b=success (fast, a didn't signal).
  test-cpu-gate-race:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
      - uses: ./
        with:
          slow-cpu-pattern: ${{ matrix.speedracer == 'a' && steps.cpu.outputs.model || 'NEVER_MATCH_THIS' }}
      - name: Work
        run: |
          echo "Copy ${{ matrix.speedracer }}: working"
          sleep 5

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>&1 || echo "(no log)"

  verify-cpu-gate-race:
    needs: test-cpu-gate-race
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert copy b survived despite stale in_progress from a
        run: |
          check_name="test-cpu-gate-race"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs"
            [[ "$count" -gt 0 ]] && { echo "PASS: last-copy survived the stale in_progress race"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run — last-copy was killed by stale in_progress"; exit 1

  # Test 18: ARM64 runner must never be CPU-gated.
  # arm64 runners report host EPYC CPU in /proc/cpuinfo (virtualized).
  # Without RUNNER_ARCH guard, the CPU check would false-positive gate them.
  # Uses actual CPU model as slow pattern — must NOT trigger on ARM64.
  # Expected: a=success (arm64 skips CPU gate regardless of CPU model).
  test-arm64-not-gated:
    strategy:
      matrix:
        speedracer: [a]
    runs-on: ubuntu-24.04-arm
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model (will be used as slow pattern)
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs || true)
          arch="${RUNNER_ARCH}"
          echo "model=${model:-unknown}" >> "$GITHUB_OUTPUT"
          echo "CPU: ${model:-unknown}, RUNNER_ARCH: ${arch}"
      - uses: ./
        with:
          slow-cpu-pattern: ${{ steps.cpu.outputs.model }}
      - name: Assert we reached work (not gated)
        run: |
          echo "PASS: arm64 runner was not CPU-gated despite matching slow pattern"
          echo "RUNNER_ARCH=${RUNNER_ARCH}"


  # ─── Runner survey ────────────────────────────────────────────────────────
  # Collects CPU model from every job in this workflow run.
  # Provides data on runner pool composition for tuning slow-cpu-pattern.
  runner-survey:
    needs:
      - test-a-wins
      - test-three-copy
      - test-ab-slow-c-wins
      - test-a-slow-b-wins
      - test-disabled
      - test-fast-winner
      - test-four-copy
      - test-all-slow-last-survives
      - test-special-chars-matrix
      - test-cpu-gate-race
      - test-arm64-not-gated
      - test-fastest-only
      - test-unknown-cpu-degrades-safely
      - test-tsv-reading
      - test-tsv-missing-fallback
      - test-tsv-override
      - test-tsv-empty-fallback
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Collect CPU models from all jobs in this run
        run: |
          echo "=== Runner Pool Survey for run ${{ github.run_id }} ==="
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.conclusion != null) | {name: .name, runner: .runnerName, labels: .labels}' | \
            jq -s 'group_by(.labels) | .[] | {labels: .[0].labels, count: length, jobs: [.[].name]}' 2>/dev/null || true
          echo ""
          echo "=== CPU models from job logs ==="
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.conclusion != null) | .databaseId' | while read JOB_ID; do
            cpu=$(gh api "repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs" 2>&1 | grep "cpu=" | grep -v "36;1m" | head -1 | sed 's/.*cpu=//' | sed 's/ copy=.*//')
            [[ -n "$cpu" ]] && echo "$cpu"
          done | sort | uniq -c | sort -rn

  # Test 19: Extreme — gate everything except the fastest CPU (9V74).
  # 8 copies, only 9V74 proceeds. With ~42% 9V74 rate, P(at least one) = 99.2%.
  # If no 9V74, last-copy runs on whatever it got (safe fallback).
  # Expected: most copies cancelled, one 9V74 copy succeeds (or last-copy fallback).
  test-fastest-only:
    strategy:
      matrix:
        speedracer: [a, b, c, d, e, f, g, h]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
          echo "CPU: ${model}"
      - uses: ./
        with:
          # Gate everything that is NOT 9V74 — inverse pattern.
          # Since glob can't do "not contains", we match specific slow patterns.
          # 7763 OR Xeon OR 9V45 — anything that isn't 9V74.
          slow-cpu-pattern: ${{ contains(steps.cpu.outputs.model, '9V74') && 'NEVER_MATCH_THIS' || steps.cpu.outputs.model }}
      - name: Work
        run: |
          echo "Copy ${{ matrix.speedracer }}: running on $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)"
          sleep 10

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>&1 || echo "(no log)"

  verify-fastest-only:
    needs: test-fastest-only
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for post-step
        run: sleep 20
      - name: Assert at least one copy succeeded
        run: |
          check_name="test-fastest-only"
          for i in $(seq 1 12); do
            count=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?filter=all&per_page=100" \
              --jq "[.check_runs[] | select(.name == \"${check_name}\" and .conclusion == \"success\")] | length")
            echo "attempt $i: ${count} success check-runs"
            [[ "$count" -gt 0 ]] && { echo "PASS: at least one copy got fastest CPU or last-copy fallback ran"; exit 0; }
            sleep 10
          done
          echo "FAIL: no success check-run"; exit 1
      - name: Report which copies won and on what CPU
        run: |
          echo "=== Job outcomes ==="
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name | startswith("test-fastest-only")) | "\(.name): \(.conclusion)"' | sort

  # Test 20: Unknown CPU — slow-cpu-pattern matches nothing.
  # Simulates a runner pool hardware change where all CPUs are new models.
  # All copies should proceed normally (no gating, no cancellation).
  # The action degrades to "no speedracer" — safe but no deduplication.
  # Expected: all copies succeed.
  test-unknown-cpu-degrades-safely:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: FUTURE_CPU_THAT_DOES_NOT_EXIST_YET
      - name: Work
        run: |
          echo "Copy ${{ matrix.speedracer }}: running (no CPU match, all copies proceed)"
          sleep 5


  # Test 21: Verify runner-pool.tsv is readable and action default matches.
  # The profiler generates runner-pool.tsv with the slowest CPU as the first
  # data row. The action's slow-cpu-pattern default should match that value.
  # ─── TSV tests ────────────────────────────────────────────────────────────

  test-tsv-reading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Assert runner-pool.tsv exists and is valid
        run: |
          [[ -f runner-pool.tsv ]] || { echo "FAIL: runner-pool.tsv missing"; exit 1; }
          lines=$(grep -cv '^#' runner-pool.tsv)
          echo "runner-pool.tsv has ${lines} CPU entries"
          [[ "$lines" -gt 0 ]] || { echo "FAIL: no CPU entries"; exit 1; }
          first=$(grep -v '^#' runner-pool.tsv | head -1 | cut -f1)
          echo "Slowest CPU ID: '${first}'"
          [[ -n "$first" ]] || { echo "FAIL: empty first column"; exit 1; }
          cat runner-pool.tsv
          echo "PASS"

  test-tsv-missing-fallback:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Delete runner-pool.tsv
        run: rm -f runner-pool.tsv
      - uses: ./
      - name: Assert gate completed with hardcoded fallback
        run: |
          [[ -f /tmp/speedracer-check-name ]] || { echo "FAIL: gate didn't complete"; exit 1; }
          echo "PASS: action works without runner-pool.tsv"
      - name: Work
        run: sleep 5

  test-tsv-override:
    strategy:
      matrix:
        speedracer: [a]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./
        with:
          slow-cpu-pattern: CUSTOM_OVERRIDE_PATTERN
      - name: Assert override took priority
        run: |
          echo "PASS: reached work — override pattern didn't match, TSV was ignored"
      - name: Work
        run: sleep 5

  test-tsv-empty-fallback:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Replace TSV with empty file
        run: echo "# empty profile" > runner-pool.tsv
      - uses: ./
      - name: Assert gate completed with hardcoded fallback
        run: |
          [[ -f /tmp/speedracer-check-name ]] || { echo "FAIL: gate didn't complete"; exit 1; }
          echo "PASS: action handles empty TSV gracefully"
      - name: Work
        run: sleep 5
